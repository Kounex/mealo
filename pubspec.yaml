name: mealo
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.6.1

environment:
  sdk: '>=3.0.0 <4.0.0'

# Globals for packages which share the same version
isar_version: &isar_version 4.0.0-dev.14

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Base components
  base_components:
    git:
      url: https://github.com/Kounex/base_components.git
      ref: main

  # Unique identifier for our models
  uuid: ^4.5.1

  # Immutability - constrained by Isar source_gen requirements
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1

  # JSON parser and serializer
  # crimson: ^0.2.1

  # State management - limited by Isar analyzer constraints
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.4.0

  # Local storage - constrained by analyzer <7.0.0
  isar: *isar_version
  isar_flutter_libs: *isar_version

  shared_preferences: ^2.3.2

  # Navigator 2.0
  beamer: ^1.7.0

  # Some fancy utility functions for collections
  collection: ^1.18.0

  # Enable selecting files
  image_picker: ^1.2.2

  # HTTP client
  dio: ^5.8.0

  # Some hashing functions
  crypto: ^3.0.6

  # Work with paths / directories
  path_provider: ^2.1.5

  # UI
  # Consistent theming
  flex_color_scheme: ^8.3.0

  # Power up slivers
  sliver_tools: ^0.2.12

  # Animations
  flutter_staggered_animations: ^1.1.1

  # Microsoft icons pack
  fluentui_system_icons: ^1.1.260

  # Adjust text size correctly
  auto_size_text: ^3.0.0

  # Powered-up animations
  flutter_animate: ^4.5.0

  # Pre-built color picker because it is a pain in the ass to do on my own
  flutter_colorpicker: ^1.1.0

  # App Icon
  flutter_launcher_icons: ^0.14.2

  # Native Splash Screen for initializing
  flutter_native_splash: ^2.4.7

  # Reorder everything
  reorderable_grid:
    git:
      url: https://github.com/Kounex/reorderable_grid.git
      ref: drag-background

  # Share files
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting and analysis
  flutter_lints: ^3.0.2
  custom_lint: ^0.6.4
  # riverpod_lint: # Disabled due to analyzer constraints with Isar

  # Code generation - constrained by Isar analyzer <7.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.13

  # Generator stuff
  # isar_generator: *isar_version


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
